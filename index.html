<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅遊點餐助手 🗺️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .country-scroll::-webkit-scrollbar { display: none; }
    .country-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen select-none">

<!-- ===== 設定 Modal ===== -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-end">
  <div class="bg-slate-800 w-full rounded-t-2xl p-5 space-y-4 max-w-lg mx-auto">
    <div class="flex justify-between items-center">
      <h2 class="text-lg font-bold">⚙️ 設定</h2>
      <button onclick="closeSettings()" class="text-slate-400 text-2xl leading-none">×</button>
    </div>
    <div>
      <label class="text-xs text-slate-400 uppercase tracking-wide">Gemini API Key（必填）</label>
      <input id="apiKeyInput" type="password" placeholder="AIzaSy..."
        class="w-full mt-1.5 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
      <p class="text-xs text-slate-500 mt-1">👉 <a href="https://aistudio.google.com/apikey" target="_blank" class="text-blue-400 underline">點這裡免費申請 Gemini API Key</a></p>
    </div>
    <div>
      <label class="text-xs text-slate-400 uppercase tracking-wide">Apps Script URL（選填，記帳用）</label>
      <input id="scriptUrlInput" type="url" placeholder="https://script.google.com/macros/s/..."
        class="w-full mt-1.5 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
      <p class="text-xs text-slate-500 mt-1">參考 apps-script.js 設定 Google 試算表記帳</p>
    </div>
    <button onclick="saveSettings()"
      class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-xl py-3 font-semibold">
      儲存設定
    </button>
  </div>
</div>

<!-- ===== 給店員看 Modal ===== -->
<div id="waiterModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
  <div class="bg-white text-gray-900 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
    <div id="waiterHeader" class="bg-red-600 text-white px-6 py-4 text-center">
      <p class="text-xs opacity-80 mb-1" id="waiterSubtitle">ご注文をお願いします</p>
      <h2 class="text-xl font-bold" id="waiterRestaurantName"></h2>
    </div>
    <div class="px-6 py-4 space-y-1 max-h-72 overflow-y-auto" id="waiterContent"></div>
    <div class="px-6 py-3 border-t border-gray-200">
      <div class="flex justify-between items-center font-bold text-lg">
        <span>合計</span>
        <span id="waiterTotal" class="text-red-600">¥0</span>
      </div>
    </div>
    <div class="px-6 pb-5 pt-2">
      <button onclick="closeWaiterModal()"
        class="w-full bg-gray-900 text-white rounded-xl py-3 font-semibold" id="waiterCloseBtn">
        閉じる（關閉）
      </button>
    </div>
  </div>
</div>

<!-- ===== 換餐廳確認 Modal ===== -->
<div id="newRestaurantModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-end">
  <div class="bg-slate-800 w-full rounded-t-2xl p-5 space-y-4 max-w-lg mx-auto">
    <h2 class="text-lg font-bold">🔄 換新的餐廳</h2>
    <p class="text-sm text-slate-400">目前的菜單將會清除，請輸入新餐廳名稱（可留空）</p>
    <input id="newRestaurantName" type="text" placeholder="例：壽司郎 梅田店（留空自動編號）"
      class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-orange-500">
    <div class="flex gap-3">
      <button onclick="closeNewRestaurantModal()"
        class="flex-1 bg-slate-700 hover:bg-slate-600 rounded-xl py-3 text-sm font-medium">
        取消
      </button>
      <button onclick="confirmNewRestaurant()"
        class="flex-1 bg-orange-500 hover:bg-orange-600 rounded-xl py-3 text-sm font-semibold">
        確認換餐廳
      </button>
    </div>
  </div>
</div>

<!-- ===== Header ===== -->
<div class="sticky top-0 bg-slate-900/95 backdrop-blur border-b border-slate-800 z-40">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-base font-bold">🗺️ 旅遊點餐助手</h1>
      <p class="text-xs text-slate-400" id="restaurantLabel">第 1 間餐廳</p>
    </div>
    <div class="flex gap-2">
      <button onclick="openNewRestaurantModal()"
        class="bg-orange-500/20 text-orange-400 border border-orange-500/30 text-xs px-3 py-1.5 rounded-lg font-medium">
        換餐廳 🔄
      </button>
      <button onclick="openSettings()"
        class="bg-slate-800 text-slate-400 text-xs px-3 py-1.5 rounded-lg">
        ⚙️
      </button>
    </div>
  </div>
</div>

<!-- ===== 主要內容 ===== -->
<div class="max-w-lg mx-auto px-4 pt-4 pb-36 space-y-4">

  <!-- 國家選擇 -->
  <div class="bg-slate-800 rounded-2xl p-3 space-y-2">
    <h2 class="font-semibold text-sm px-1">🌏 選擇國家</h2>
    <div class="country-scroll flex gap-2 overflow-x-auto pb-1">
      <!-- 自動偵測 -->
      <button onclick="selectCountry('auto')" id="btn-auto"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🌐</span>
        <span class="text-xs font-medium whitespace-nowrap">自動</span>
      </button>
      <!-- 亞洲 -->
      <button onclick="selectCountry('japan')" id="btn-japan"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇯🇵</span>
        <span class="text-xs font-medium whitespace-nowrap">日本</span>
      </button>
      <button onclick="selectCountry('korea')" id="btn-korea"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇰🇷</span>
        <span class="text-xs font-medium whitespace-nowrap">韓國</span>
      </button>
      <button onclick="selectCountry('thailand')" id="btn-thailand"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇹🇭</span>
        <span class="text-xs font-medium whitespace-nowrap">泰國</span>
      </button>
      <button onclick="selectCountry('vietnam')" id="btn-vietnam"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇻🇳</span>
        <span class="text-xs font-medium whitespace-nowrap">越南</span>
      </button>
      <button onclick="selectCountry('singapore')" id="btn-singapore"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇸🇬</span>
        <span class="text-xs font-medium whitespace-nowrap">新加坡</span>
      </button>
      <button onclick="selectCountry('malaysia')" id="btn-malaysia"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇲🇾</span>
        <span class="text-xs font-medium whitespace-nowrap">馬來西亞</span>
      </button>
      <button onclick="selectCountry('hongkong')" id="btn-hongkong"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇭🇰</span>
        <span class="text-xs font-medium whitespace-nowrap">香港</span>
      </button>
      <button onclick="selectCountry('indonesia')" id="btn-indonesia"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇮🇩</span>
        <span class="text-xs font-medium whitespace-nowrap">印尼</span>
      </button>
      <button onclick="selectCountry('philippines')" id="btn-philippines"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇵🇭</span>
        <span class="text-xs font-medium whitespace-nowrap">菲律賓</span>
      </button>
      <!-- 歐美 -->
      <button onclick="selectCountry('usa')" id="btn-usa"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇺🇸</span>
        <span class="text-xs font-medium whitespace-nowrap">美國</span>
      </button>
      <button onclick="selectCountry('uk')" id="btn-uk"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇬🇧</span>
        <span class="text-xs font-medium whitespace-nowrap">英國</span>
      </button>
      <button onclick="selectCountry('france')" id="btn-france"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇫🇷</span>
        <span class="text-xs font-medium whitespace-nowrap">法國</span>
      </button>
      <button onclick="selectCountry('italy')" id="btn-italy"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇮🇹</span>
        <span class="text-xs font-medium whitespace-nowrap">義大利</span>
      </button>
      <button onclick="selectCountry('australia')" id="btn-australia"
        class="country-btn flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl border-2 text-center transition-all">
        <span class="text-xl">🇦🇺</span>
        <span class="text-xs font-medium whitespace-nowrap">澳洲</span>
      </button>
    </div>
  </div>

  <!-- 拍照區 -->
  <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
    <div class="flex items-center justify-between">
      <h2 class="font-semibold text-sm">📷 菜單照片</h2>
      <span class="text-xs text-slate-500" id="photoCount">尚未選擇</span>
    </div>

    <label for="photoInput"
      class="flex flex-col items-center justify-center border-2 border-dashed border-slate-600 rounded-xl py-5 cursor-pointer active:bg-slate-700 transition">
      <span class="text-3xl">📸</span>
      <span class="text-sm text-slate-300 mt-2 font-medium">拍照或選擇圖片</span>
      <span class="text-xs text-slate-500 mt-0.5">支援多張（多頁菜單）</span>
    </label>
    <input id="photoInput" type="file" accept="image/*" multiple class="hidden" onchange="handlePhotos(event)">

    <!-- 預覽縮圖 -->
    <div id="photoPreviews" class="flex gap-2 flex-wrap"></div>

    <button id="translateBtn" onclick="translateMenu()" disabled
      class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:bg-slate-700 disabled:text-slate-500 rounded-xl py-3 font-semibold text-sm transition">
      🔍 翻譯菜單
    </button>
  </div>

  <!-- 載入中 -->
  <div id="loadingDiv" class="hidden text-center py-10 space-y-3 fade-in">
    <div class="text-4xl spin inline-block">⏳</div>
    <p class="text-slate-400 text-sm">Gemini 正在辨識菜單...</p>
    <p class="text-slate-600 text-xs">需要 5-15 秒，請稍候</p>
  </div>

  <!-- 翻譯錯誤 -->
  <div id="errorDiv" class="hidden bg-red-900/30 border border-red-800 rounded-2xl p-4 fade-in">

    <p class="text-red-300 text-xs mt-1" id="errorMsg"></p>

  <!-- 菜單列表 -->

      </div>
      <div class="flex gap-3 text-xs">
        <button onclick="selectAll()" class="text-blue-400 active:text-blue-300">全選</button>
        <span class="text-slate-700">|</span>
        <button onclick="selectNone()" class="text-slate-400 active:text-slate-300">清除</button>
      </div>
    </div>

    <!-- 手動新增 -->
    <div id="addManualRow" class="hidden flex gap-2">
      <input id="manualLocal" type="text" placeholder="原文菜名" class="flex-1 bg-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      <input id="manualZh" type="text" placeholder="中文" class="flex-1 bg-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      <input id="manualPrice" type="number" placeholder="價格" class="w-20 bg-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      <button onclick="addManualItem()" class="bg-blue-600 rounded-lg px-3 py-2 text-sm font-medium">新增</button>
    </div>

    <div id="menuItems" class="space-y-2"></div>

    <button onclick="toggleManualAdd()"
      class="w-full border border-dashed border-slate-600 text-slate-500 text-xs py-2.5 rounded-xl active:bg-slate-800">

    </button>
  </div>

</div>

<!-- ===== 底部 Action Bar ===== -->
<div id="actionBar" class="hidden fixed bottom-0 left-0 right-0 z-40">
  <div class="max-w-lg mx-auto bg-slate-800 border-t border-slate-700 px-4 py-3 shadow-xl">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs text-slate-400">已選 <span id="selectedCount" class="text-white font-medium">0</span> 項</p>
        <p class="text-2xl font-bold"><span id="currencySymbol">¥</span><span id="totalPrice">0</span></p>
      </div>
      <div class="flex gap-2">
        <button onclick="showWaiterModal()" id="waiterBtn"
          class="bg-green-600 hover:bg-green-700 active:bg-green-800 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-lg">
          🇯🇵 給店員看
        </button>
        <button onclick="saveToSheets()"
          class="bg-slate-600 hover:bg-slate-500 active:bg-slate-400 text-white px-4 py-2.5 rounded-xl text-sm font-semibold">
          📊 記帳
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast"
  class="hidden fixed top-20 left-1/2 -translate-x-1/2 bg-slate-700 text-white text-sm px-4 py-2.5 rounded-xl shadow-xl z-50 whitespace-nowrap">
</div>

<script>
// ==================== Country Config ====================
const COUNTRIES = {
  auto:        { name: '自動偵測', flag: '🌐', currency: '',   lang: '自動',     waiterSubtitle: 'Order please',         waiterClose: '關閉',                 headerColor: 'bg-slate-700',  localPlaceholder: '原文菜名' },
  japan:       { name: '日本',    flag: '🇯🇵', currency: '¥',   lang: '日文',     waiterSubtitle: 'ご注文をお願いします', waiterClose: '閉じる（關閉）',       headerColor: 'bg-red-600',   localPlaceholder: '日文菜名' },
  korea:       { name: '韓國',    flag: '🇰🇷', currency: '₩',   lang: '韓文',     waiterSubtitle: '주문해 주세요',       waiterClose: '닫기（關閉）',         headerColor: 'bg-blue-700',  localPlaceholder: '韓文菜名' },
  thailand:    { name: '泰國',    flag: '🇹🇭', currency: '฿',   lang: '泰文',     waiterSubtitle: 'กรุณาสั่งอาหาร',   waiterClose: 'ปิด（關閉）',         headerColor: 'bg-blue-600',  localPlaceholder: '泰文菜名' },
  vietnam:     { name: '越南',    flag: '🇻🇳', currency: '₫',   lang: '越南文',   waiterSubtitle: 'Xin gọi món',        waiterClose: 'Đóng（關閉）',         headerColor: 'bg-red-700',   localPlaceholder: '越南文菜名' },
  singapore:   { name: '新加坡',  flag: '🇸🇬', currency: 'S$',  lang: '英文',     waiterSubtitle: 'May I take your order?', waiterClose: 'Close（關閉）',    headerColor: 'bg-red-600',   localPlaceholder: '英文菜名' },
  malaysia:    { name: '馬來西亞', flag: '🇲🇾', currency: 'RM',  lang: '馬來文',   waiterSubtitle: 'Boleh saya ambil pesanan?', waiterClose: 'Tutup（關閉）', headerColor: 'bg-blue-700',  localPlaceholder: '馬來文菜名' },
  hongkong:    { name: '香港',    flag: '🇭🇰', currency: 'HK$', lang: '廣東話',   waiterSubtitle: '請問要點咩？',       waiterClose: '關閉',                 headerColor: 'bg-red-600',   localPlaceholder: '廣東話菜名' },
  indonesia:   { name: '印尼',    flag: '🇮🇩', currency: 'Rp',  lang: '印尼文',   waiterSubtitle: 'Boleh pesan sekarang?', waiterClose: 'Tutup（關閉）',    headerColor: 'bg-red-600',   localPlaceholder: '印尼文菜名' },
  philippines: { name: '菲律賓',  flag: '🇵🇭', currency: '₱',   lang: '菲律賓文', waiterSubtitle: 'Mag-order na po?',   waiterClose: 'Isara（關閉）',        headerColor: 'bg-blue-700',  localPlaceholder: '菲律賓文菜名' },
  usa:         { name: '美國',    flag: '🇺🇸', currency: '$',   lang: '英文',     waiterSubtitle: 'May I take your order?', waiterClose: 'Close（關閉）',    headerColor: 'bg-blue-800',  localPlaceholder: '英文菜名' },
  uk:          { name: '英國',    flag: '🇬🇧', currency: '£',   lang: '英文',     waiterSubtitle: 'May I take your order?', waiterClose: 'Close（關閉）',    headerColor: 'bg-blue-800',  localPlaceholder: '英文菜名' },
  france:      { name: '法國',    flag: '🇫🇷', currency: '€',   lang: '法文',     waiterSubtitle: 'Je voudrais commander', waiterClose: 'Fermer（關閉）',   headerColor: 'bg-blue-700',  localPlaceholder: '法文菜名' },
  italy:       { name: '義大利',  flag: '🇮🇹', currency: '€',   lang: '義大利文', waiterSubtitle: 'Vorrei ordinare',    waiterClose: 'Chiudi（關閉）',       headerColor: 'bg-green-700', localPlaceholder: '義大利文菜名' },
  australia:   { name: '澳洲',    flag: '🇦🇺', currency: 'A$',  lang: '英文',     waiterSubtitle: 'May I take your order?', waiterClose: 'Close（關閉）',    headerColor: 'bg-green-700', localPlaceholder: '英文菜名' },
};

// ==================== State ====================
const state = {
  restaurantNum: parseInt(localStorage.getItem('restaurantNum') || '1'),
  restaurantName: localStorage.getItem('restaurantName') || '',
  photos: [],      // [{data: base64, mime: string, preview: url}]
  menuItems: [],   // [{id, local, zh, price, quantity, selected}]
  apiKey: localStorage.getItem('geminiApiKey') || '',
  scriptUrl: localStorage.getItem('appsScriptUrl') || '',
  country: localStorage.getItem('country') || 'auto',
  detectedCountry: null,  // 自動偵測後的結果
  nextId: 0,
};

// ==================== Init ====================
function init() {
  updateRestaurantLabel();
  renderCountrySelector();
  updateCountryUI();
  if (!state.apiKey) {
    setTimeout(() => document.getElementById('settingsModal').classList.remove('hidden'), 600);
  }
}

// ==================== Country ====================
function selectCountry(countryKey) {
  state.country = countryKey;
  state.detectedCountry = null;
  localStorage.setItem('country', countryKey);
  renderCountrySelector();
  updateCountryUI();
  const info = COUNTRIES[countryKey];
  showToast(countryKey === 'auto' ? '🌐 已切換為自動偵測語言' : `已切換到 ${info.flag} ${info.name}`);
}

function getActiveCountry() {
  // 自動模式下，若已偵測到國家，使用偵測結果；否則用 auto 的預設值
  if (state.country === 'auto' && state.detectedCountry) {
    return COUNTRIES[state.detectedCountry] || COUNTRIES.auto;
  }
  return COUNTRIES[state.country] || COUNTRIES.auto;
}

function renderCountrySelector() {
  const c = state.country;
  document.querySelectorAll('.country-btn').forEach(btn => {
    const key = btn.id.replace('btn-', '');
    if (key === c) {
      btn.className = btn.className.replace('bg-slate-700/50 border-slate-600 text-slate-300', '');
      btn.classList.add('bg-blue-600/30', 'border-blue-500', 'text-white');
      btn.classList.remove('bg-slate-700/50', 'border-slate-600', 'text-slate-300');
    } else {
      btn.classList.remove('bg-blue-600/30', 'border-blue-500', 'text-white');
      btn.classList.add('bg-slate-700/50', 'border-slate-600', 'text-slate-300');
    }
  });
}

// 壓縮圖片到 1280px 以內，JPEG 0.82 品質，大幅減少傳輸量（3MB → ~250KB）
function compressImage(file) {
  return new Promise((resolve) => {
    const MAX = 1280;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const w = img.width, h = img.height;
        let nw = w, nh = h;
        if (w > MAX || h > MAX) {
          if (w > h) { nw = MAX; nh = Math.round(h * MAX / w); }
          else       { nh = MAX; nw = Math.round(w * MAX / h); }
        }
        const canvas = document.createElement('canvas');
        canvas.width = nw; canvas.height = nh;
        canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        resolve({ data: dataUrl.split(',')[1], mime: 'image/jpeg', preview: dataUrl });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handlePhotos(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;

  state.photos = [];
  document.getElementById('photoPreviews').innerHTML = '';
  document.getElementById('photoCount').textContent = '壓縮中...';

  Promise.all(files.map(compressImage)).then(results => {
    results.forEach((photo, index) => {
      state.photos[index] = photo;
      const thumb = document.createElement('div');
      thumb.className = 'relative flex-shrink-0';
      thumb.innerHTML = `
        <img src="${photo.preview}" class="w-16 h-16 object-cover rounded-lg border border-slate-600">
        <span class="absolute -top-1 -right-1 bg-blue-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">${index + 1}</span>
      `;
      document.getElementById('photoPreviews').appendChild(thumb);
    });
    document.getElementById('photoCount').textContent = `${files.length} 張`;
    document.getElementById('translateBtn').disabled = false;
  });
}

// ==================== Gemini API ====================
async function translateMenu() {
  if (!state.apiKey) { openSettings(); showToast('請先設定 API Key ⚠️'); return; }
  if (!state.photos.length) { showToast('請先選擇菜單照片 ⚠️'); return; }

  document.getElementById('loadingDiv').classList.remove('hidden');
  document.getElementById('menuSection').classList.add('hidden');
  document.getElementById('errorDiv').classList.add('hidden');
  document.getElementById('actionBar').classList.add('hidden');
  document.getElementById('translateBtn').disabled = true;

  try {
    const parts = [
      { text: getCountryPrompt() },
      ...state.photos.map(p => ({
        inline_data: { mime_type: p.mime, data: p.data }
      }))
    ];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: {
            temperature: 0.1,
            maxOutputTokens: 4096,
            thinkingConfig: { thinkingBudget: 0 }  // 關閉 2.5 的思考模式，避免混入推理文字
          }
        })
      }
    );

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    // 2.5 思考模式可能有多個 parts（thought + answer），取所有 text parts 合併
    const allParts = data.candidates?.[0]?.content?.parts || [];
    let text = allParts
      .filter(p => !p.thought)           // 過濾掉思考內容
      .map(p => p.text || '')
      .join('\n');

    // 清理 JSON：移除 markdown 包裹、BOM、控制字元
    text = text
      .replace(/```json\s*/gi, '')
      .replace(/```\s*/g, '')
      .replace(/^\uFEFF/, '')
      .trim();

    // 找到 JSON 陣列（取最後一個，跳過思考文字中可能的方括號）
    const allMatches = [...text.matchAll(/\[[\s\S]*?\]/g)];
    // 優先找包含 "local" 或 "zh" 的陣列
    const match = allMatches.reverse().find(m => m[0].includes('"local"') || m[0].includes('"zh"') || m[0].includes('"ja"'))
      || allMatches[0];
    if (!match) {
      console.error('Gemini 原始回傳：', text);
      throw new Error('無法解析格式，請重試');
    }

    let parsed;
    try {
      parsed = JSON.parse(match[0]);
    } catch (e) {
      // 嘗試修復常見錯誤：trailing comma
      const fixed = match[0].replace(/,\s*([}\]])/g, '$1');
      parsed = JSON.parse(fixed);
    }
    if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('菜單辨識結果為空');

    state.menuItems = parsed.map(item => ({
      id: state.nextId++,
      local: item.local || item.ja || '',   // 相容舊格式
      zh: item.zh || '',
      price: parseInt(item.price) || 0,
      quantity: 1,
      selected: false
    }));

    // 自動偵測模式：根據第一個品項的 local 文字猜測語言
    if (state.country === 'auto') {
      const sample = state.menuItems.slice(0, 5).map(i => i.local).join('');
      const detected = detectLanguageFromText(sample);
      if (detected) {
        state.detectedCountry = detected;
        updateCountryUI();
        const dInfo = COUNTRIES[detected];
        showToast(`找到 ${state.menuItems.length} 項 ✅ 偵測為 ${dInfo.flag} ${dInfo.name}`);
      } else {
        showToast(`找到 ${state.menuItems.length} 個品項 ✅`);
      }
    } else {
      showToast(`找到 ${state.menuItems.length} 個品項 ✅`);
    }

    renderMenu();

  } catch (err) {
    console.error(err);
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorDiv').classList.remove('hidden');
    showToast('翻譯失敗 ❌');
  } finally {
    document.getElementById('loadingDiv').classList.add('hidden');
    document.getElementById('translateBtn').disabled = false;
  }
}

// ==================== Menu Rendering ====================
function renderMenu() {
  if (!state.menuItems.length) return;

  const info = getActiveCountry();

  document.getElementById('menuSection').classList.remove('hidden');
  document.getElementById('itemCountLabel').textContent =
    `共 ${state.menuItems.length} 項，點選後加入訂單`;

  const container = document.getElementById('menuItems');
  container.innerHTML = '';

  state.menuItems.forEach(item => {
    const card = document.createElement('div');
    card.id = `card-${item.id}`;
    card.className = `rounded-xl border-2 transition-all p-3 ${
      item.selected
        ? 'bg-blue-900/30 border-blue-600'
        : 'bg-slate-800 border-slate-700'
    }`;

    card.innerHTML = `
      <div class="flex items-center gap-3">
        <!-- Checkbox -->
        <div onclick="toggleItem(${item.id})"
          class="flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all ${
            item.selected ? 'bg-blue-600 border-blue-600' : 'border-slate-500'
          }">
          ${item.selected ? '<span class="text-white text-xs font-bold">✓</span>' : ''}
        </div>

        <!-- 菜名 -->
        <div class="flex-1 min-w-0 cursor-pointer" onclick="toggleItem(${item.id})">
          <p class="text-sm font-medium leading-tight">${escHtml(item.zh)}</p>
          <p class="text-xs text-slate-400 mt-0.5 truncate">${escHtml(item.local)}</p>
          <p class="text-sm font-bold mt-1 ${item.price > 0 ? 'text-blue-400' : 'text-slate-500'}">
            ${item.price > 0 ? info.currency + item.price.toLocaleString() : '價格未知'}
          </p>
        </div>

        <!-- 數量控制 -->
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <button onclick="changeQty(${item.id}, -1)"
            class="w-7 h-7 rounded-full bg-slate-700 active:bg-slate-600 flex items-center justify-center text-sm font-bold text-slate-300">−</button>
          <span class="w-5 text-center text-sm font-semibold">${item.quantity}</span>
          <button onclick="changeQty(${item.id}, 1)"
            class="w-7 h-7 rounded-full bg-slate-700 active:bg-slate-600 flex items-center justify-center text-sm font-bold text-slate-300">＋</button>
          <button onclick="removeItem(${item.id})"
            class="w-7 h-7 rounded-full bg-red-900/40 active:bg-red-900 flex items-center justify-center text-xs text-red-400 ml-1">✕</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  updateTotal();
}

function toggleItem(id) {
  const item = state.menuItems.find(i => i.id === id);
  if (item) { item.selected = !item.selected; renderMenu(); }
}

function changeQty(id, delta) {
  const item = state.menuItems.find(i => i.id === id);
  if (!item) return;
  item.quantity = Math.max(1, item.quantity + delta);
  if (delta > 0 && !item.selected) item.selected = true;
  renderMenu();
}

function removeItem(id) {
  state.menuItems = state.menuItems.filter(i => i.id !== id);
  if (state.menuItems.length === 0) {
    document.getElementById('menuSection').classList.add('hidden');
    document.getElementById('actionBar').classList.add('hidden');
  } else {
    renderMenu();
  }
}

function selectAll() {
  state.menuItems.forEach(i => i.selected = true);
  renderMenu();
}

function selectNone() {
  state.menuItems.forEach(i => { i.selected = false; i.quantity = 1; });
  renderMenu();
}

function updateTotal() {
  const info = getActiveCountry();
  const selected = state.menuItems.filter(i => i.selected);
  const total = selected.reduce((s, i) => s + i.price * i.quantity, 0);
  document.getElementById('selectedCount').textContent = selected.length;
  document.getElementById('totalPrice').textContent = total.toLocaleString();
  document.getElementById('currencySymbol').textContent = info.currency;
  document.getElementById('actionBar').classList.toggle('hidden', state.menuItems.length === 0);
}

// ==================== 記帳到 Google Sheets ====================
async function saveToSheets() {
  if (!state.scriptUrl) {
    showToast('請先在設定中填入 Apps Script URL ⚠️');
    openSettings();
    return;
  }

  const selected = state.menuItems.filter(i => i.selected);
  if (!selected.length) { showToast('請先勾選要記帳的品項 ⚠️'); return; }

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const date = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const restaurant = state.restaurantName || `第${state.restaurantNum}間餐廳`;
  const total = selected.reduce((s, i) => s + i.price * i.quantity, 0);
  const info = getActiveCountry();

  showToast('記帳中... 📊');

  try {
    const payload = JSON.stringify({
      date, time, restaurant,
      country: info.name,
      currency: info.currency,
      items: selected.map(i => ({
        local: i.local, zh: i.zh,
        price: i.price, quantity: i.quantity,
        subtotal: i.price * i.quantity
      })),
      total
    });
    await fetch(state.scriptUrl + '?' + new URLSearchParams({ payload }), {
      method: 'GET',
      mode: 'no-cors'
    });
    showToast('已記帳到 Google 試算表 ✅');
  } catch (err) {
    showToast('記帳失敗，請確認網路連線 ❌');
  }
}

// ==================== Utils ====================
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let toastTimer;
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), duration);
}

// ==================== 語言偵測 ====================
function detectLanguageFromText(text) {
  if (!text) return null;
  // 用 Unicode 區段判斷主要語言
  const counts = {
    japan:       (text.match(/[\u3040-\u309F\u30A0-\u30FF]/g) || []).length,  // 平假名/片假名
    korea:       (text.match(/[\uAC00-\uD7AF]/g) || []).length,                // 韓文字母
    thailand:    (text.match(/[\u0E00-\u0E7F]/g) || []).length,                // 泰文
    vietnam:     (text.match(/[\u1EA0-\u1EF9\u00C0-\u00FF]/g) || []).length,  // 越南文
    france:      0, italy: 0, // 法/義文難以從字元區分，靠關鍵字
    china:       (text.match(/[\u4E00-\u9FFF]/g) || []).length,                // 中日韓漢字（輔助）
  };

  // 韓文最明確
  if (counts.korea > 0) return 'korea';
  // 泰文最明確
  if (counts.thailand > 0) return 'thailand';
  // 日文（平假名/片假名）
  if (counts.japan > 0) return 'japan';
  // 越南文（帶聲調的拉丁字母）
  if (counts.vietnam > 2) return 'vietnam';

  return null; // 無法判斷（英文菜單不足以區分國家）
}
